name: JoeScreen
# XcodeGen spec for the JoeScreen app layer (DECISIONS D8). Generated with XcodeGen 2.42.0:
#   xcodegen generate --spec Apps/project.yml
# The generated Apps/JoeScreen.xcodeproj is gitignored — regenerate from this spec, which IS
# committed. The .xcodeproj consumes the local SwiftPM package (one dir up) so `swift test` stays
# the primary machine gate and the app layer only adds the product/entitlements/signing that Xcode
# needs.

options:
  bundleIdPrefix: com.joescreen
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  # Generate Info.plist files from the `info:` blocks below rather than committing raw plists.
  generateEmptyDirectories: true

# The local Swift package (Package.swift is in the repo root, one level above this spec).
packages:
  JoeScreen:
    path: ..

# ─────────────────────────────────────────────────────────────────────────────────────────────
# Signing (M1 Killed-9 landmine).
#
# When TEAM_ID is UNSET (the demo/CI default): ad-hoc sign (`CODE_SIGN_IDENTITY = -`), do NOT
# require signing, and ship the EMPTY entitlements file — the restricted group-session entitlement
# in an ad-hoc-signed app with no provisioning profile is killed by AMFI at launch (Killed: 9) on
# Apple Silicon. The group-session entitlement isn't needed until M7.
#
# When TEAM_ID IS set: pass it in the environment (`TEAM_ID=ABCDE12345 xcodegen generate ...`) so
# ${TEAM_ID} substitutes into DEVELOPMENT_TEAM, then switch CODE_SIGN_ENTITLEMENTS to the
# JoeScreen-macOS-team.entitlements file and set a real CODE_SIGN_IDENTITY. See README.
# ─────────────────────────────────────────────────────────────────────────────────────────────
settings:
  base:
    # ${TEAM_ID} expands from the environment; empty when unset (harmless for ad-hoc).
    DEVELOPMENT_TEAM: ${TEAM_ID}
    # Ad-hoc by default so the app launches with no profile. Override for a real team build.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    SWIFT_VERSION: "6.0"

targets:
  # ── macOS app: the M1–M6 vertical slice (Direct Session Mode → live shared windows + voice). ──
  JoeScreen-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: macOS/Sources
      - path: Shared/Sources
      # App icon asset catalog (App Store requires a full macOS icon set + CFBundleIconName).
      - path: macOS/Resources/Assets.xcassets
    dependencies:
      - package: JoeScreen
        product: JoeScreenKit
      - package: JoeScreen
        product: JoeScreenLiveKit
      - package: JoeScreen
        product: JoeScreenCaptureMac
      - package: JoeScreen
        product: JoeScreenInputMac
      - package: JoeScreen
        product: JoeScreenUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joescreen.app
        PRODUCT_NAME: JoeScreen
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "8"
        # App icon from the asset catalog → emits CFBundleIconName (App Store validation requires it).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Entitlements file, overridable by the ship scripts via ${SHIP_MAC_ENTITLEMENTS}. Defaults to
        # the EMPTY file so `bun run dev` (ad-hoc, no TEAM_ID) launches without an AMFI Killed-9; the
        # ship path sets it to the -appstore file (minimal, App-Store-signable). dev.sh/app.sh export
        # the default too since xcodegen has no default syntax.
        CODE_SIGN_ENTITLEMENTS: ${SHIP_MAC_ENTITLEMENTS}
        # Non-sandboxed Developer-ID/TestFlight distribution (D6): App Sandbox deliberately absent.
        ENABLE_APP_SANDBOX: "NO"
    info:
      path: macOS/Resources/Info-macOS.plist
      properties:
        CFBundleName: JoeScreen
        CFBundleDisplayName: JoeScreen
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "8"
        LSMinimumSystemVersion: "14.0"
        # App icon set name (App Store validation requires the key explicitly, like iOS).
        CFBundleIconName: AppIcon
        # App Store category (required for App Store Connect / TestFlight submission).
        LSApplicationCategoryType: "public.app-category.productivity"
        # Export compliance: the app uses only standard exempt encryption (HTTPS/TLS via the LiveKit
        # SDK), so declare non-exempt=false to skip the per-upload compliance prompt in App Store Connect.
        ITSAppUsesNonExemptEncryption: false
        # SwiftUI app has no storyboard/nib; the @main App scene owns the window.
        NSHighResolutionCapable: true
        # Mic usage string (M5 voice via LiveKit setMicrophone; required or the app crashes on ask).
        NSMicrophoneUsageDescription: "JoeScreen uses your microphone for live voice during a shared session."
        # Camera string for the webcam bubbles (F11): shown in the camera-TCC prompt.
        NSCameraUsageDescription: "JoeScreen can share your camera as an optional video bubble."
        # Opt in to Continuity Camera (iPhone as webcam) in AVFoundation device enumeration; without
        # this, CameraCapturer.captureDevices() logs a warning and omits the Continuity device.
        NSCameraUseContinuityCameraDeviceType: true
        # SharePlay support flag (M7). Declaring it is inert without the group-session entitlement.
        NSSupportsGroupActivities: true
        # Custom URL scheme for `joescreen://join?...` deep-link joins (Direct Session Mode, §1).
        CFBundleURLTypes:
          - CFBundleURLName: com.joescreen.app.join
            CFBundleURLSchemes:
              - joescreen

  # ── iOS app: viewer + voice ONLY (M8). NO control target — iOS can't be remote-controlled and
  # can't inject into other apps (R6, permanent). Consumes JoeScreenKit + JoeScreenLiveKit; does NOT
  # link the macOS-only capture/input targets. Standard sandboxed App-Store-eligible app.
  JoeScreen-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/Sources
      - path: Shared/Sources
      # App icon asset catalog (App Store requires a 1024 icon + CFBundleIconName).
      - path: iOS/Resources/Assets.xcassets
    dependencies:
      - package: JoeScreen
        product: JoeScreenKit
      - package: JoeScreen
        product: JoeScreenLiveKit
      - package: JoeScreen
        product: JoeScreenUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joescreen.app.ios
        PRODUCT_NAME: JoeScreen
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "8"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        # App icon from the asset catalog → emits CFBundleIconName (App Store validation requires it).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Entitlements file. SHIP_IOS_ENTITLEMENTS is exported by the ship scripts (build-ipa.sh) to
        # select minimal (default, no restricted entitlements → auto-signing works before SharePlay
        # approval) vs full (after approval). For plain `bun run dev` the var is unset, so this must
        # fall back to a real file — xcodegen has no default syntax, so dev.sh/app.sh export it too.
        CODE_SIGN_ENTITLEMENTS: ${SHIP_IOS_ENTITLEMENTS}
        # Signing is ALLOWED so a Release/TestFlight archive can be code-signed. The ship scripts
        # (scripts/build-ipa.sh) pass CODE_SIGN_STYLE=Automatic + DEVELOPMENT_TEAM on the archive
        # command; local Debug builds still run unsigned/ad-hoc (CODE_SIGNING_REQUIRED stays NO here).
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
    info:
      path: iOS/Resources/Info-iOS.plist
      properties:
        CFBundleName: JoeScreen
        CFBundleDisplayName: JoeScreen
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "8"
        # App Store category + export-compliance (same rationale as macOS above).
        LSApplicationCategoryType: "public.app-category.productivity"
        ITSAppUsesNonExemptEncryption: false
        # Name of the app-icon set in Assets.xcassets. Apple validation requires this key explicitly
        # (actool doesn't always merge it into the plist), so declare it here to be certain.
        CFBundleIconName: AppIcon
        # App Transport Security: allow non-TLS connections so the viewer can reach a plaintext dev
        # SFU (ws://localhost / ws://<lan>) and http token server during testing. NSAllowsLocalNetworking
        # permits loopback/LAN without TLS; NSAllowsArbitraryLoads covers a plaintext tunnel URL too.
        # (A production SFU uses wss:// + a real cert, which ATS accepts without these.)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
        # iPad multitasking requires ALL FOUR orientations (Apple validation rejects a partial set).
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "JoeScreen uses your microphone for live voice during a shared session."
        # Required even though the iOS viewer never opens the camera: the LiveKit SDK references camera
        # APIs, so Apple's static analysis (ITMS-90683) mandates a purpose string or it rejects the build.
        NSCameraUsageDescription: "JoeScreen may use your camera for optional video during a shared session."
        NSSupportsGroupActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: com.joescreen.app.join
            CFBundleURLSchemes:
              - joescreen
