# Production LiveKit SFU config. Keys are injected at runtime via LIVEKIT_KEYS env (never in git).
port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50100
  tcp_port: 7881
  use_external_ip: true
keys:
  # overridden by LIVEKIT_KEYS env ("APIkey: secret") at runtime — see docker-compose.deploy.yml
  placeholder: placeholder
room:
  auto_create: true
  empty_timeout: 300
turn:
  # Direct UDP + ICE-TCP fallback works for most networks. Enable + wire a cert for strict firewalls.
  enabled: false
logging:
  level: info
