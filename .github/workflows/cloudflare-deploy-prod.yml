name: Production • Cloudflare

# Deploy the Cloudflare Worker apps to production on merges to main.
# (Adapted from golf-app's cloudflare-deploy-prod: detect which worker dirs changed, then deploy
# each in parallel. Simplified — production only.)
on:
  push:
    branches: [main]
    paths:
      - "apps/joescreen-download/**"
      - "apps/cheffing-hub/**"
      - "bun.lock"
      - ".github/workflows/cloudflare-deploy-prod.yml"
  # Manual runs deploy every worker — the recovery path when a push-triggered run failed.
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.changed.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed worker apps
        id: changed
        run: |
          # Worker apps = apps/* dirs that have a wrangler.jsonc.
          ALL=$(find apps -maxdepth 2 -name wrangler.jsonc | xargs -n1 dirname | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(length>0))')
          BEFORE="${{ github.event.before }}"
          # Manual runs, first pushes, and force pushes (no usable diff base) deploy everything.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED="$ALL"
          else
            RANGE=$(git diff --name-only "$BEFORE" ${{ github.sha }} || true)
            CHANGED=$(echo "$RANGE" | grep -E '^apps/' | cut -d/ -f1-2 | sort -u | while read d; do
              [ -f "$d/wrangler.jsonc" ] && basename "$d" || true
            done | jq -R -s -c 'split("\n") | map(select(length>0))')
            # If the workflow itself or the shared lockfile changed, deploy all workers.
            if echo "$RANGE" | grep -qE '^(\.github/workflows/cloudflare-deploy-prod\.yml|bun\.lock)$'; then
              CHANGED="$ALL"
            fi
          fi
          echo "workers=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "changed workers: $CHANGED"

  deploy:
    needs: detect
    if: ${{ needs.detect.outputs.workers != '[]' && needs.detect.outputs.workers != '' }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        worker: ${{ fromJSON(needs.detect.outputs.workers) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # The workers are bun workspace members: install once from the repo root against the root
      # bun.lock (single hoisted node_modules — see bunfig.toml).
      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 5
      - name: Typecheck
        working-directory: apps/${{ matrix.worker }}
        run: bunx tsc --noEmit
      - name: Deploy to Cloudflare (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.worker }}
          command: deploy --env production
